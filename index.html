<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RA Murales</title>
    <!-- A-Frame PRIMERO -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- MindAR DESPUÉS, usando unpkg en vez de jsdelivr -->
    <script src="https://unpkg.com/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; }
      #instructions {
        position: fixed; bottom: 20px; left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6); color: white;
        padding: 10px 20px; border-radius: 20px;
        font-family: sans-serif; font-size: 14px;
        z-index: 999; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="instructions">📷 Apunta la cámara al mural</div>

    <a-scene
      mindar-image="imageTargetSrc: ./mural.mind; autoStart: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets timeout="10000">
        <img id="info-card" src="./contenido.jpg" crossorigin="anonymous">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-image src="#info-card"
                 position="0 0 0"
                 width="1" height="0.6">
        </a-image>
      </a-entity>

    </a-scene>
  </body>
</html>
